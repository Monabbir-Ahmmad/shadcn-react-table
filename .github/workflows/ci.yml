name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. new pushes to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Version comes from the root package.json "packageManager" field.
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      # The build regenerates the committed artifacts (registry JSON, API
      # reference); a diff here means source changed without regenerating.
      - name: Generated artifacts are fresh
        run: git diff --exit-code -- apps/web/public/r apps/web/lib/api-reference.generated.ts

      # Typechecks the registry output in a consumer-shaped fixture (the `@/`
      # aliases `shadcn add` produces), guarding the exact bytes consumers get.
      - name: Registry output compiles for consumers
        run: pnpm --filter shadcn-react-table-web registry:verify
